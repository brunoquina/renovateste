<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finalizar Compra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-slate-50 pb-12">

    <div class="max-w-xl mx-auto mt-6 px-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
            <h2 class="font-bold text-lg mb-4">Finalizar Pedido</h2>
            
            <div id="step-1" class="space-y-4">
                <input type="text" id="name" class="w-full border rounded-xl px-4 py-3" placeholder="Nome completo">
                <input type="email" id="email" class="w-full border rounded-xl px-4 py-3" placeholder="E-mail">
                <input type="text" id="cpf" class="w-full border rounded-xl px-4 py-3" placeholder="CPF">
                <input type="text" id="phone" class="w-full border rounded-xl px-4 py-3" placeholder="WhatsApp">
                <button onclick="nextStep(2)" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">Próximo Passo</button>
            </div>

            <div id="step-2" class="hidden space-y-4">
                <input type="text" id="cep" maxlength="9" class="w-full border rounded-xl px-4 py-3" placeholder="CEP" oninput="mascaraCEP(this)" onblur="buscaCEP(this.value)">
                <input type="text" id="address" class="w-full border rounded-xl px-4 py-3" placeholder="Endereço">
                <div class="flex gap-2">
                    <input type="text" id="number" class="w-1/3 border rounded-xl px-4 py-3" placeholder="Nº">
                    <input type="text" id="neighborhood" class="w-2/3 border rounded-xl px-4 py-3" placeholder="Bairro">
                </div>
                <button onclick="nextStep(3)" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl">Ir para Pagamento</button>
            </div>

            <div id="step-3" class="hidden space-y-4 text-center">
                <p class="font-bold">Total: R$ 59,00</p>
                <button id="btn-finalizar" onclick="gerarPix()" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl">Gerar PIX Agora</button>
            </div>

            <div id="step-pix" class="hidden space-y-4 text-center">
                <h3 class="font-bold text-xl">Escaneie o QR Code</h3>
                <textarea id="pix-code" class="w-full p-2 border text-[10px]" rows="4" readonly></textarea>
                <button onclick="copyPix()" class="w-full bg-slate-800 text-white py-3 rounded-lg">Copiar Código PIX</button>
            </div>
        </div>
    </div>

    <script>
        function nextStep(n) {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('step-'+n).classList.remove('hidden');
        }

        // MÁSCARA E LIMITE CEP
        function mascaraCEP(i) {
            let v = i.value.replace(/\D/g, '');
            if (v.length > 5) v = v.substring(0, 5) + '-' + v.substring(5, 8);
            i.value = v;
        }

        // AUTO-PREENCHIMENTO DE ENDEREÇO
        async function buscaCEP(cep) {
            const cleanCep = cep.replace(/\D/g, '');
            if (cleanCep.length === 8) {
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cleanCep}/json/`);
                    const data = await response.json();
                    if (!data.erro) {
                        document.getElementById('address').value = data.logradouro;
                        document.getElementById('neighborhood').value = data.bairro;
                        document.getElementById('number').focus();
                    }
                } catch (e) { console.error("Erro ao buscar CEP"); }
            }
        }

        async function gerarPix() {
            const btn = document.getElementById('btn-finalizar');
            btn.innerText = "Processando..."; btn.disabled = true;

            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                phone: document.getElementById('phone').value,
                amount: 59.00
            };

            try {
                const res = await fetch('/api/gerar-pix', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('pix-code').value = data.pix_code;
                    nextStep('pix');
                } else { alert("Erro ao gerar PIX. Verifique os dados."); }
            } catch(e) { alert("Erro de conexão."); }
            btn.innerText = "Gerar PIX Agora"; btn.disabled = false;
        }

        function copyPix() {
            const copyText = document.getElementById("pix-code");
            copyText.select();
            document.execCommand("copy");
            alert("Código copiado!");
        }
    </script>
</body>
</html>
