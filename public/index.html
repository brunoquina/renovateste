<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finalizar Compra | Checkout Seguro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { pink: '#e3418e', blue: '#007bff', blueHover: '#0056b3', green: '#00c48c' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; }
        .step { display: none; animation: fadeIn 0.3s ease-in-out; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .shipping-card.selected { border-color: #007bff; background-color: #f0f7ff; }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <header class="bg-white border-b border-gray-100 py-3 px-4 shadow-sm">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <img src="https://assetsglobalbr.com/u/checkout/15c5a8c9.jpg" alt="Logo" class="h-8 object-contain">
            <div class="flex items-center text-gray-500 text-[10px] text-right leading-tight">
                <i class="bi bi-lock-fill text-gray-700 text-lg mr-1.5"></i>
                <div><strong class="text-gray-800">PAGAMENTO</strong><br><span>100% SEGURO</span></div>
            </div>
        </div>
    </header>

    <div class="max-w-xl mx-auto mt-6 px-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <span class="font-semibold">Resumo do pedido</span>
                <span class="font-bold text-lg" id="total-header">R$ 59,00</span>
            </div>
            <div class="flex gap-4 items-center">
                <div class="w-16 h-16 rounded-xl overflow-hidden border shrink-0">
                    <img src="https://assetsglobalbr.com/u/testimony/8a90fdac.jpg" class="w-full h-full object-cover">
                </div>
                <div class="flex-1">
                    <h3 class="font-medium text-sm">Kit Promocional - Encerra Hoje!</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-xs bg-slate-100 px-2 py-1 rounded">- 1 +</span>
                        <span class="font-bold text-sm">R$ 59,00</span>
                    </div>
                </div>
            </div>
            <div class="space-y-2 text-sm text-slate-600 border-t mt-4 pt-4">
                <div class="flex justify-between"><span>Frete</span><span class="font-bold text-green-600" id="frete-valor">Grátis</span></div>
                <div class="flex justify-between pt-2 border-t text-base"><span class="font-bold">Total</span><span class="font-bold text-xl text-slate-900" id="total-footer">R$ 59,00</span></div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
            <div id="step-1" class="step active">
                <h2 class="font-bold text-lg mb-4 flex items-center gap-2">Identificação</h2>
                <div class="space-y-4">
                    <input type="text" id="name" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="Nome completo">
                    <input type="email" id="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="E-mail">
                    <input type="text" id="cpf" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="000.000.000-00">
                    <input type="text" id="phone" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="(00) 00000-0000">
                    <button class="w-full bg-brand-blue text-white font-semibold rounded-xl py-4" onclick="nextStep(2)">Ir Para Entrega</button>
                </div>
            </div>

            <div id="step-2" class="step">
                <h2 class="font-bold text-lg mb-4 flex items-center gap-2">Entrega</h2>
                <div class="space-y-4">
                    <input type="text" id="cep" maxlength="9" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="00000-000" oninput="mascaraCEP(this)" onblur="buscaCEP(this.value)">
                    <input type="text" id="address" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="Endereço">
                    <div class="flex gap-3">
                        <input type="text" id="number" class="w-1/3 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="Nº">
                        <input type="text" id="neighborhood" class="w-2/3 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3" placeholder="Bairro">
                    </div>
                    <div class="pt-2">
                        <div class="shipping-card border-2 rounded-xl p-3 mb-3 flex justify-between selected" onclick="selectShipping(0, this)">
                            <div class="flex gap-2"><div><p class="text-sm font-bold">Frete Grátis</p><p class="text-xs text-slate-500">5-6 dias</p></div></div>
                            <span class="text-green-600 font-bold text-sm">Grátis</span>
                        </div>
                        <div class="shipping-card border-2 rounded-xl p-3 flex justify-between" onclick="selectShipping(23.65, this)">
                            <div class="flex gap-2"><div><p class="text-sm font-bold">Frete Expresso</p><p class="text-xs text-slate-500">Até 2 dias</p></div></div>
                            <span class="font-bold text-sm">R$ 23,65</span>
                        </div>
                    </div>
                    <button class="w-full bg-brand-blue text-white font-semibold rounded-xl py-4" onclick="nextStep(3)">Ir Para Pagamento</button>
                </div>
            </div>

            <div id="step-3" class="step">
                <h2 class="font-bold text-lg mb-4 flex items-center gap-2">Pagamento</h2>
                <div class="border-2 border-brand-blue rounded-2xl p-4 mb-5 bg-blue-50 flex items-center gap-3">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                        <i class="bi bi-qr-code-scan text-brand-blue text-xl"></i>
                    </div>
                    <div><p class="text-sm font-bold">PIX</p><p class="text-xs text-green-700">Aprovação imediata</p></div>
                </div>
                <button id="btn-finalizar" class="w-full bg-brand-blue text-white font-bold text-lg rounded-xl py-4 shadow-lg" onclick="gerarPix()">Finalizar Compra</button>
            </div>

            <div id="step-pix" class="step text-center">
                <h3 class="font-extrabold text-2xl mb-4">Pague com PIX</h3>
                <textarea id="pix-code" class="w-full bg-slate-50 border rounded-xl p-3 text-[10px] mb-4" rows="4" readonly></textarea>
                <button class="w-full bg-brand-green text-white font-bold rounded-xl py-4 mb-4" onclick="copyPix()">Copiar Código PIX</button>
            </div>
        </div>
    </div>

    <script>
        let basePrice = 59.00;
        let shippingPrice = 0.00;

        function mascaraCEP(i) {
            let v = i.value.replace(/\D/g, '');
            if (v.length > 5) v = v.substring(0, 5) + '-' + v.substring(5, 8);
            i.value = v;
        }

        async function buscaCEP(cep) {
            const cleanCep = cep.replace(/\D/g, '');
            if (cleanCep.length === 8) {
                try {
                    const response = await fetch(`https://viacep.com.br/ws/${cleanCep}/json/`);
                    const data = await response.json();
                    if (!data.erro) {
                        document.getElementById('address').value = data.logradouro;
                        document.getElementById('neighborhood').value = data.bairro;
                        document.getElementById('number').focus();
                    }
                } catch (e) { console.error("Erro busca CEP"); }
            }
        }

        function selectShipping(val, el) {
            document.querySelectorAll('.shipping-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            shippingPrice = val;
            let total = (basePrice + shippingPrice).toFixed(2).replace('.', ',');
            document.getElementById('total-header').innerText = `R$ ${total}`;
            document.getElementById('total-footer').innerText = `R$ ${total}`;
            document.getElementById('frete-valor').innerText = val === 0 ? "Grátis" : `R$ ${val.toFixed(2).replace('.',',')}`;
        }

        function nextStep(s) {
            document.querySelectorAll('.step').forEach(x => x.classList.remove('active'));
            document.getElementById('step-'+s).classList.add('active');
            window.scrollTo(0,0);
        }

        async function gerarPix() {
            const btn = document.getElementById('btn-finalizar');
            btn.innerText = "Processando..."; btn.disabled = true;
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                phone: document.getElementById('phone').value,
                amount: (basePrice + shippingPrice)
            };
            try {
                const res = await fetch('/api/gerar-pix', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('pix-code').value = data.pix_code;
                    nextStep('pix');
                } else { alert("Erro ao gerar PIX."); }
            } catch(e) { alert("Erro de conexão."); }
            btn.innerText = "Finalizar Compra"; btn.disabled = false;
        }

        function copyPix() {
            const copyText = document.getElementById("pix-code");
            copyText.select();
            document.execCommand("copy");
            alert("Copiado!");
        }
    </script>
</body>
</html>
